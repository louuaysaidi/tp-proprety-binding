<div class="container">
  <h1>Page Login</h1>
  <form (ngSubmit)="login()">
    <div *ngIf="errorMessage" class="error-message">
      ❌ {{ errorMessage }}
    </div>
    <div class="form-group">
      <label for="username">Username:</label>
      <input
        type="text"
        id="username"
        [(ngModel)]="username"
        name="username"
        placeholder="Enter your username"
        required
      />
    </div>
    <div class="form-group">
      <label for="password">Password:</label>
      <input
        type="password"
        id="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Enter your password"
        required
      />
    </div>
    <button type="submit" class="btn">
      Se connecter
    </button>
  </form>
</div>
